        }

body {
    margin: 0;
    min-height: 100dvh;   /* 🔥 better than 100vh */
    display: flex;
    flex-direction: column;

    overflow-y: auto;     /* ✅ allow scrolling */
    overflow-x: hidden;


    background: 
        linear-gradient(rgba(11,14,20,0.85), rgba(11,14,20,0.95)),

    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
}

        /* --- GLOBAL GRID --- */


        /* --- TOP BAR (PIXEL MATCH UPDATE) --- */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 16px;
            z-index: 10;
        }

        .header-left { display: flex; gap: 48px; align-items: center; }

        .profile-container {
            width: 44px; height: 44px;
            background: #2d3748;
            border-radius: 50%;
            position: relative;
            border: 2px solid var(--green-bright);
            display: flex; align-items: center; justify-content: center;
        }
        .profile-container svg { width: 28px; height: 28px; fill: #94a3b8; }
        
        .profile-badge {
            position: absolute; top: -1px; right: -1px;
            width: 14px; height: 14px;
            background: var(--green-bright);
            border: 2px solid var(--bg-deep);
            border-radius: 50%;
            color: white; font-size: 11px; font-weight: 900;
            display: flex; align-items: center; justify-content: center;
        }

        .gift-box {
            width: 44px; height: 44px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
        }
        .gift-svg { width: 30px; height: 30px; filter: drop-shadow(0 4px 8px rgba(0, 168, 255, 0.6)); }

        .header-right { display: flex; align-items: center; gap: 12px; }

        .balance-pill {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 4px 14px;
            border-radius: 12px;
            min-width: 100px;
        }
        .balance-label { font-size: 10px; color: var(--text-muted); display: block; letter-spacing: 0.2px; }
        .balance-val { font-size: 18px; font-weight: 600; display: flex; justify-content: space-between; align-items: center; }

        .wallet-btn {
            width: 44px; height: 44px;
            background: radial-gradient(circle at top left, #065f46, #043d2e);
            border: 1.2px solid var(--green-bright);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
        }
        .wallet-btn svg { width: 24px; height: 24px; stroke: var(--green-bright); stroke-width: 2.2; }

        /* --- ASSET BAR --- */
        .asset-row { padding: 0 15px; display: flex; gap: 8px; z-index: 10; }
        .asset-pill {
            background: var(--bg-panel);
            padding: 8px 12px;
            border-radius: 10px;
            font-size: 12px; font-weight: bold;
            display: flex; align-items: center; gap: 10px;
        }

        /* --- CHART AREA & TIMELINES --- */
        .chart-container {
            flex-grow: 1;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .main-chart {
            flex-grow: 1;
            position: relative;
            display: flex;
            align-items: center;
        }
        
        /* Grid timestamps labels */
        .grid-timelines {
            position: absolute;
            bottom: 5px;
            width: 100%;
            display: flex;
            justify-content: space-around;
            color: var(--text-muted);
            font-size: 10px;
            pointer-events: none;
        }

        /* The horizontal timeline row between Chart and Panel */
        .horizontal-timeline {
            display: flex;
            justify-content: space-between;
            padding: 8px 24px;
            color: var(--text-muted);
            font-size: 12px;
            z-index: 5;
        }

        .price-line {
            width: 100%; height: 1px;
            background: rgba(0, 168, 255, 0.3);
            display: flex; justify-content: flex-end;
        }
        .price-bubble {
            background: var(--blue-glow);
            padding: 2px 8px; border-radius: 4px;
            font-size: 11px; font-weight: bold;
            transform: translateY(-50%);
        }

.nav-card {
    background: #1c2330; /* darker like Pocket Option */
    flex: 1;
    border-radius: 14px;
    padding: 12px 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    transition: all 0.2s ease;

}
.nav-card {
    background: #1c2330;
    border: 1px solid transparent;
    box-shadow: none;
}

.nav-card.active {
    background: linear-gradient(180deg, #00c85320, #00c85305);
    border: 1px solid rgba(0, 200, 83, 0.4);
    box-shadow: 0 0 12px rgba(0, 200, 83, 0.3);
}
.nav-card.active span {
    color: #00c853;
}

.nav-card.active svg {
    stroke: #00c853;
}
.nav-card span {
    font-size: 10px;
    color: var(--text-muted);
    transition: all 0.2s ease;
}
        
        /* SVG Icon common */
        svg { fill: none; stroke: var(--text-muted); stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

.nav-card svg {
    width: 22px;
    height: 22px;
    stroke: var(--text-muted);
    stroke-width: 2.5;
    transition: all 0.2s ease;
}

@keyframes pulseLine {
    0% { opacity: 0.3; }
    50% { opacity: 1; }
    100% { opacity: 0.3; }
}

.price-line {
    animation: pulseLine 1.5s infinite;
}
.btn:active {
    transform: scale(0.95);
    filter: brightness(1.3);
}
.live-dot {
    position: absolute;
    right: 20px;
    width: 8px;
    height: 8px;
    background: var(--blue-glow);
    border-radius: 50%;
    box-shadow: 0 0 10px var(--blue-glow);
    animation: pulseDot 1s infinite;
}

@keyframes pulseDot {
    0% { transform: scale(1); opacity: 1; }
    100% { transform: scale(2); opacity: 0; }
}
.live-dot {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);

    height: 8px;

}
.price-line {

}

let currentAmount = "1";

function openAmount() {
    document.getElementById("amountPopup").style.transform = "translateY(0)";
    document.getElementById("popupAmount").innerText = currentAmount;
}

function addNum(num) {
    if (currentAmount === "0") currentAmount = "";
    currentAmount += num;
    document.getElementById("popupAmount").innerText = currentAmount;
}

function clearAmount() {
    currentAmount = "0";
    document.getElementById("popupAmount").innerText = currentAmount;
}

function doneAmount() {
    document.getElementById("amountVal").innerText = currentAmount;
    document.getElementById("amountPopup").style.transform = "translateY(100%)";
}
</script>

<script>
let balance = parseFloat(localStorage.getItem("balance")) || 100;
let payout = 0.9;

// ===============================
// 🔥 BASE VARIABLES
// ===============================
let candles = [];
let currentCandle = null;
let currentPrice = null;

let candleLife = 15000;
let momentum = 0;
function updateTimer() {
    const now = Date.now();

    const elapsed = now % candleLife;
    const remaining = candleLife - elapsed;

    let seconds = Math.floor(remaining / 1000);
    let ms = Math.floor((remaining % 1000) / 100);

    let formatted =
        String(seconds).padStart(2, '0') + ":" +
        String(ms).padStart(2, '0');

    document.getElementById("timeVal").textContent = formatted;

    requestAnimationFrame(updateTimer);
}
function updateProfit() {
    let amount = parseFloat(document.getElementById("amountVal").textContent);

    let profit = amount * payout;
    let payoutTotal = amount + profit;

    // Profit → +0.92
    document.getElementById("profitVal").textContent = "+$" + profit.toFixed(2);

    // Payout → $1.92
    document.getElementById("payoutMoney").textContent = "$" + payoutTotal.toFixed(2);
}
let trendDirection = Math.random() > 0.5 ? 1 : -1;
let phase = "trend";

// ===============================
// 🔥 LOAD DATA
// ===============================
let savedCandles = JSON.parse(localStorage.getItem("candles") || "[]");
let lastTime = parseInt(localStorage.getItem("lastTime"));
let savedPrice = parseFloat(localStorage.getItem("lastPrice"));

currentPrice = savedPrice || 1.08;
candles = savedCandles.length ? savedCandles : [];

// ===============================
// 🔥 CANVAS
// ===============================
const canvas = document.getElementById("chart");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
    canvas.width = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

let candleWidth = 12;
let gap = 5;

// ===============================
// 🔥 MAIN LOOP (SMOOTH)
// ===============================
function loop() {

    // 🔄 phase change
    if (Math.random() > 0.97) {
        let phases = ["trend", "pullback", "consolidation"];
        phase = phases[Math.floor(Math.random() * phases.length)];
    }

    // 🔄 trend change
    if (Math.random() > 0.98) {
        trendDirection = Math.random() > 0.5 ? 1 : -1;
    }

    // ===============================
    // 🔥 FAST PRICE MOVEMENT
    // ===============================
    if (phase === "trend") {
        momentum += trendDirection * 0.002;
        momentum = Math.max(Math.min(momentum, 0.05), -0.05);

        currentPrice += momentum + trendDirection * (0.01 + Math.random() * 0.01);

        if (Math.random() > 0.95) {
            currentPrice += trendDirection * (0.05 + Math.random() * 0.05);
        }
    }

    if (phase === "pullback") {
        momentum *= 0.4;
        currentPrice += (-trendDirection) * (0.008 + Math.random() * 0.008);
    }

    if (phase === "consolidation") {
        momentum *= 0.8;
        currentPrice += (Math.random() - 0.5) * 0.004;
    }

    // 💣 spike
    if (Math.random() > 0.98) {
        let shock = (Math.random() > 0.5 ? 1 : -1) * (0.04 + Math.random() * 0.04);
        currentPrice += shock;
        momentum = shock * 0.4;
    }

    let price = currentPrice;

    // ===============================
    // 🔥 CREATE FIRST CANDLE
    // ===============================
    if (!currentCandle) {
        let time = Math.floor(Date.now() / candleLife) * candleLife;

        currentCandle = {
            open: price,
            high: price,
            low: price,
            close: price,
            time
        };

        candles.push(currentCandle);
    }

    // ===============================
    // 🔥 UPDATE LIVE CANDLE
    // ===============================
    currentCandle.close = price;

    // 🔥 REAL WICKS
    let wick = Math.random() * 0.02;
    if (Math.random() > 0.94) wick += Math.random() * 0.08;

    currentCandle.high = Math.max(currentCandle.high, price + wick);
    currentCandle.low = Math.min(currentCandle.low, price - wick);

    // ===============================
    // 🔥 NEW CANDLE (15s aligned)
    // ===============================
    let now = Date.now();
    let slot = Math.floor(now / candleLife) * candleLife;

    if (slot > currentCandle.time) {
        currentCandle = {
            open: price,
            high: price,
            low: price,
            close: price,
            time: slot
        };

        candles.push(currentCandle);

        const maxCandles = Math.floor(canvas.width / (candleWidth + gap));
        if (candles.length > maxCandles) candles.shift();
    }

    // SAVE
    localStorage.setItem("candles", JSON.stringify(candles));
    localStorage.setItem("lastTime", Date.now());
    localStorage.setItem("lastPrice", currentPrice);

    document.querySelector(".price-bubble").textContent = price.toFixed(5);

    drawChart();

    requestAnimationFrame(loop);
}
loop();
updateTimer();
updateProfit(); // 👈 ADD THIS

// ===============================
// 🔥 DRAW CHART (FIXED BODY)
// ===============================
function drawChart() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (candles.length < 2) return;

    let prices = candles.flatMap(c => [c.high, c.low]);
    let max = Math.max(...prices);
    let min = Math.min(...prices);

    let range = max - min;
    let padding = Math.max(range * 0.3, 0.0005);
    max += padding;
    min -= padding;

    let scaleY = canvas.height / (max - min);

    let rightOffset = 90;
    let startX = canvas.width - rightOffset - (candles.length * (candleWidth + gap));

    candles.forEach((c, i) => {
        let x = startX + i * (candleWidth + gap);

        let openY = canvas.height - (c.open - min) * scaleY;
        let closeY = canvas.height - (c.close - min) * scaleY;
        let highY = canvas.height - (c.high - min) * scaleY;
        let lowY = canvas.height - (c.low - min) * scaleY;

        let isUp = c.close > c.open;

        ctx.strokeStyle = isUp ? "#00c853" : "#f44336";
        ctx.fillStyle = isUp ? "#00c853" : "#f44336";

        // wick
        ctx.beginPath();
        ctx.moveTo(x + candleWidth / 2, highY);
        ctx.lineTo(x + candleWidth / 2, lowY);
        ctx.stroke();

        // 🔥 BODY THAT FOLLOWS PRICE
        let bodyHeight = Math.abs(closeY - openY);
        if (bodyHeight < 2) bodyHeight = 2;

        ctx.fillRect(
            x,
            Math.min(openY, closeY),
            candleWidth,
            bodyHeight
        );
    });

    let lastPrice = candles[candles.length - 1].close;
    let y = canvas.height - (lastPrice - min) * scaleY;

    document.querySelector(".price-line").style.top = y + "px";
}
</script>
