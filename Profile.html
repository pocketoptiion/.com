<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<style>
:root {
    --bg: #1e2433;
    --card: #22293d;
    --text: #ffffff;
    --sub: #bfc7d5;
    --accent: #00c853;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: var(--bg);
    color: var(--text);
    font-family: "Segoe UI", sans-serif;
}

/* Responsive container */
.page {
    width: 100%;
    max-width: 420px;
    margin: auto;
    padding: 16px;
}

/* PROFILE */
.profile {
    display: flex;
    gap: 14px;
    align-items: center;
}
.avatar {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    border: 3px solid #00ff66;
    background: linear-gradient(135deg, #2a3147, #1e2433);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 6px 18px rgba(0,0,0,0.4);
}

.profile-info h2 {
    font-size: clamp(16px, 2vw, 18px);
}
.profile-info p {
    font-size: 12px;
    color: var(--sub);
    margin: 2px 0;
}

.badge {
    background: var(--accent);
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 10px;
    margin-top: 5px;
    display: inline-block;
}

/* DEPOSIT */
.deposit {
    margin-top: 18px;
    padding: 14px;
    border-radius: 14px;
    text-align: center;
    font-weight: bold;
    border: 1px solid var(--accent);
    background: rgba(0, 255, 150, 0.05);
    transition: 0.2s;
}

.deposit:active {
    transform: scale(0.97);
}

/* CARDS */
.cards {
    display: flex;
    gap: 12px;
    margin-top: 20px;
}

.card {
    flex: 1;
    height: 100px;
    border-radius: 16px;
    display: flex;
    align-items: flex-end;
    justify-content: flex-start;
    padding: 10px;
    font-weight: bold;
    font-size: 13px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.3);
    transition: transform 0.2s;
}

.card:active {
    transform: scale(0.95);
}

.card.green {
    background: linear-gradient(135deg, #9cff00, #00c853);
}

.card.blue {
    background: linear-gradient(135deg, #003cff, #00bcd4);
}

/* MENU */
.section {
    margin-top: 25px;
}

.menu-item {
    display: flex;
    align-items: center;
    padding: 14px 10px;
    border-radius: 12px;
    color: #cfd6e4;
    font-size: 15px;
    transition: 0.2s;
}

.menu-item:hover {
    background: #2a3147;
}

.menu-item:active {
    transform: scale(0.97);
}

.menu-item.active {
    color: white;
    background: #2a3147;
}

.menu-item span {
    margin-left: 12px;
}

.right {
    margin-left: auto;
}

.badge-num {
    background: #00bcd4;
    padding: 4px 8px;
    border-radius: 10px;
    font-size: 11px;
}

/* Divider */
.divider {
    height: 1px;
    background: #2f3650;
    margin: 10px 0;
}

/* FOOTER STICKY */
.bottom {
    margin-top: 20px;
    padding-bottom: 20px;
}

/* Tablet responsiveness */
@media (min-width: 600px) {
    .page {
        max-width: 500px;
    }

    .avatar {
        width: 80px;
        height: 80px;
    }

    .card {
        height: 120px;
    }
}
.menu-item {
    display: flex;
    align-items: center;
    padding: 16px 14px; /* more breathing space */
    margin-bottom: 10px; /* spacing between items */
    border-radius: 14px;
    color: #cfd6e4;
    font-size: 15px;
    gap: 14px;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.04); /* subtle card feel */
    transition: 0.2s;
}

.menu-item svg {
    width: 20px;
    height: 20px;
    min-width: 20px; /* prevents shrinking */
    display: block;
}
.menu-item {
    transition: 0.2s;
}
.menu-item.active {
    background: #2c344d;
    color: #fff;
    border: none;
}
.profile {
    display: flex;
    gap: 16px;
    align-items: center;
    margin-bottom: 15px;
}
.deposit {
    margin-top: 20px;
    padding: 16px;
    border-radius: 18px;
    text-align: center;
    font-weight: 600;
    border: 1.5px solid #00c853;
    background: rgba(0, 255, 150, 0.08);
}
.page {
    padding: 18px 16px 30px;
}
#user-balance {
    font-size: 18px;
    font-weight: bold;
    color: #00ff99;
}
.profile {
    display: flex;
    gap: 18px;
    align-items: flex-start;
}

/* Avatar ring */
.avatar-wrap {
    position: relative;
}

.avatar {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    border: 6px solid #00c853;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #2a3147;
}

/* Online dot */
.status-dot {
    position: absolute;
    right: 6px;
    top: 6px;
    width: 18px;
    height: 18px;
    background: #00c853;
    border-radius: 50%;
    border: 3px solid #1e2433;
}

/* Name + verify */
.top-row {
    display: flex;
    align-items: center;
    gap: 8px;
}

.top-row h2 {
    font-size: 18px;
    font-weight: 600;
}

/* Verified badge */
.verify {
    background: #3a4664;
    border-radius: 50%;
    padding: 4px;
    display: flex;
}

/* Info rows */
.info-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: #9aa4b2;
    margin-top: 6px;
}

.info-row svg {
    min-width: 16px;
}

/* Rwanda flag */
.flag-rw {
    width: 22px;
    height: 14px;
    border-radius: 2px;
    margin-left: 6px;
    background:
        linear-gradient(#00a1de 50%, #fad201 50%, #fad201 75%, #20603d 75%);
}

/* Badge */
.badge {
    margin-top: 10px;
    background: #00c853;
    padding: 5px 14px;
    border-radius: 14px;
    font-size: 11px;
    font-weight: 500;
}
#user-email {
    color: #8f9bb3;
    font-size: 13px;
}
a.menu-item {
    text-decoration: none;
    display: flex;
    align-items: center;
    color: inherit;
}
.menu-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px;
  color: #8f9bb3;
  cursor: pointer;
  transition: all 0.2s ease;
}
.menu-item,
.menu-item * {
  -webkit-tap-highlight-color: transparent;
}
</style>
</head>

<p id="user-email">Loading...</p>

<script>
function uidToNumber(uid) {
  let num = "";
  for (let i = 0; i < uid.length; i++) {
    num += uid.charCodeAt(i);
  }
  return num.slice(0, 9);
}
</script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
const firebaseConfig = {
  apiKey: "AIzaSyCbuLoyGu6v7dJUDQ0iM2DkvEZs0D9z2Do",
  authDomain: "mfs-africa-ltd.firebaseapp.com",
  databaseURL: "https://mfs-africa-ltd-default-rtdb.firebaseio.com",
  projectId: "mfs-africa-ltd",
  storageBucket: "mfs-africa-ltd.appspot.com",
  messagingSenderId: "686833267635",
  appId: "1:686833267635:web:c5a531346887f6452bd1c6"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

const emailEl = document.getElementById("user-email");
const balanceEl = document.getElementById("user-balance");
const idEl = document.getElementById("user-id");
const nameEl = document.getElementById("user-name");

onAuthStateChanged(auth, async (user) => {

  if (user) {

    // ✅ EMAIL (from logged user)
    emailEl.textContent = maskEmail(user.email);

    // ✅ USER ID (short like real apps)
idEl.textContent = "ID " + uidToNumber(user.uid);

    // ✅ NAME (fallback if none)
    nameEl.textContent = user.displayName || "Trader";

    // ✅ BALANCE from DB
    try {
      const snap = await get(ref(db, "users/" + user.uid));

      if (snap.exists()) {
        const data = snap.val();
        balanceEl.textContent = "$" + (data.balance ?? 0);
      } else {
        balanceEl.textContent = "$0";
      }

    } catch (err) {
      balanceEl.textContent = "$0";
    }

  } else {
    // ❌ Not logged in
    emailEl.textContent = "Not logged in";
    idEl.textContent = "ID ---";
    nameEl.textContent = "Unknown User";
    balanceEl.textContent = "$0";
  }

});
</script>
<script>
function maskEmail(email) {
  const [name, domain] = email.split("@");

  const visibleStart = name.slice(0, 3);
  const visibleEnd = name.slice(-2);

  return `${visibleStart}***${visibleEnd}@${domain}`;
}
</script>
<script>
function goDeposit() {
  window.location.href = "Deposit.html";
}
</script>
<script>
function goDashboard() {
  window.location.href = "Dashboard.html";
}
</script>

<script>function getFlagEmoji(countryCode) {
  return countryCode
    .toUpperCase()
    .replace(/./g, char =>
      String.fromCodePoint(127397 + char.charCodeAt())
    );
}
document.querySelectorAll(".menu-item").forEach(item => {
  item.addEventListener("click", function () {
    document.querySelectorAll(".menu-item").forEach(i => i.classList.remove("active"));
    this.classList.add("active");
  });
});
function goProfile() {
  window.location.href = "verify.html";
}
async function loadUserIP() {
  try {
    // Get IP
    const ipRes = await fetch("https://api.ipify.org?format=json");
    const ipData = await ipRes.json();

    const ip = ipData.ip;

    // Get location from IP
    const geoRes = await fetch(`https://ipapi.co/${ip}/json/`);
    const geo = await geoRes.json();

    const ipEl = document.getElementById("user-ip");

    const flag = getFlagEmoji(geo.country_code || "UN");

    ipEl.textContent =
      `${ip} ${flag} | ${geo.city || "Unknown"}, ${geo.country_name || ""}`;

  } catch (err) {
    document.getElementById("user-ip").textContent =
      "IP unavailable";
  }
}

loadUserIP();
</script>
